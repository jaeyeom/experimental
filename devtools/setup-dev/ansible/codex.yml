- import_playbook: gather-facts.yml
- import_playbook: setup-npm.yml
  when: (ansible_facts['os_family'] == "Darwin") or (ansible_facts['env']['TERMUX_VERSION'] is defined)
- import_playbook: setup-nvm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"

- name: Ensure codex is present
  hosts: all
  tasks:
    - name: Include guard for codex playbook
      block:
        - name: Stop early if the codex playbook is already included
          meta: end_play
          when: codex_playbook_imported is defined
        - name: Ensure the codex playbook is not included
          set_fact:
            codex_playbook_imported: true
          when: codex_playbook_imported is not defined

    - name: Ensure codex is present on MacOS
      block:
        - name: Check if codex is installed
          shell: command -v codex
          register: codex_installed
          ignore_errors: yes
          changed_when: False

        - name: Install codex using npm
          command: npm install -g @openai/codex
          when: codex_installed.rc != 0
      when: ansible_facts['os_family'] == "Darwin"

    - name: Ensure codex is present on Termux
      block:
        - name: Check if codex is installed
          shell: command -v codex
          register: codex_installed
          ignore_errors: yes
          changed_when: False

        - name: Install codex using npm
          command: npm install -g @openai/codex --os=linux --cpu=arm64
          when: codex_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is defined

    - name: Install codex via nvm on Debian/Ubuntu
      block:
        - name: Check if codex is installed
          shell: command -v codex
          register: codex_installed
          ignore_errors: yes
          changed_when: False

        - name: Install codex using npm through nvm
          shell: |
            export NVM_DIR="{{ detected_nvm_dir }}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" \
              && nvm use --delete-prefix default --silent \
              && npm install -g @openai/codex
          when: codex_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
