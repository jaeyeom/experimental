---
- import_playbook: jq.yml
- import_playbook: setup-user-bin-directory.yml
- import_playbook: which.yml
- import_playbook: setup-claude-termux-rg.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is defined

- name: Setup Claude Code sandbox configuration
  hosts: all
  vars:
    claude_settings_dir: "{{ ansible_facts['env']['HOME'] }}/.claude"
    claude_settings_file: "{{ claude_settings_dir }}/settings.json"
    claude_tmpdir_base: "{{ ansible_facts['env']['TMPDIR'] | default('/tmp', true) }}"
    claude_tmpdir: "{{ claude_tmpdir_base }}/claude"
    sandbox_config:
      includeCoAuthoredBy: false
      hooks:
        PostToolUse:
          - matcher: "Edit|Write"
            hooks:
              - type: command
                command: >-
                  jq -r '.tool_input.file_path // empty' |
                  while read -r f; do
                    [[ -z "$f" || ! -f "$f" ]] && continue;
                    case "$f" in
                      *.go) command -v gofmt &>/dev/null && gofmt -w "$f";;
                      *.py) command -v ruff &>/dev/null && ruff format -q "$f";;
                      *.js|*.ts|*.tsx|*.jsx|*.css) command -v prettier &>/dev/null && prettier --write --log-level silent "$f";;
                      *.sh|*.bash) command -v shfmt &>/dev/null && shfmt -w "$f";;
                    esac;
                  done; true
      sandbox:
        enabled: true
        autoAllowBashIfSandboxed: true
        excludedCommands:
          - bazel
          - bazelisk  # bazel is often a symlink to bazelisk
          - docker
          - gh  # needs macOS keychain access for auth tokens
          - git
          - make
          - npm
          - pnpm
        allowUnsandboxedCommands: true
        filesystem:
          write:
            allowOnly:
              # macOS Go and golangci-lint cache paths
              - "{{ ansible_facts['env']['HOME'] }}/Library/Caches/go-build"
              - "{{ ansible_facts['env']['HOME'] }}/Library/Caches/golangci-lint"
              # Linux Go and golangci-lint cache paths
              - "{{ ansible_facts['env']['HOME'] }}/.cache/go-build"
              - "{{ ansible_facts['env']['HOME'] }}/.cache/golangci-lint"
              # Go module cache (needed for go get)
              - "{{ ansible_facts['env']['HOME'] }}/go/pkg/mod"
              # Semgrep log/cache (needed for pre-commit hooks running semgrep)
              - "{{ ansible_facts['env']['HOME'] }}/.semgrep"
              # Bazel cache (needed for git pre-commit hooks running bazel test)
              - "{{ ansible_facts['env']['HOME'] }}/.cache/bazel"
              # Githooks release clone (needed for update checks via git fetch)
              - "{{ ansible_facts['env']['HOME'] }}/.githooks/release/.git"
              # Shared Claude temp directory (needed for cross-sandbox TMPDIR
              # consistency — see issue #148). The sandbox overrides $TMPDIR to
              # a session-scoped path, so files written via $TMPDIR in sandbox
              # mode are invisible to non-sandboxed calls. Adding the real
              # TMPDIR here lets sandboxed code write to $CLAUDE_CODE_TMPDIR,
              # which stays consistent across both modes.
              - "{{ claude_tmpdir }}"
        network:
          allowedHosts:
            # GitHub
            - api.github.com
            # Go modules and downloads
            - proxy.golang.org
            - sum.golang.org
            - go.dev
            - dl.google.com
            # NPM registry
            - registry.npmjs.org
            # PyPI (Python packages)
            - pypi.org
            - files.pythonhosted.org
            # Cargo / crates.io (Rust packages)
            - crates.io
            - index.crates.io
            - static.crates.io
            # Homebrew
            - formulae.brew.sh
            - ghcr.io
            - objects.githubusercontent.com
            # Node.js downloads
            - nodejs.org
          allowUnixSockets:
            - /var/run/docker.sock
          allowLocalBinding: true
      permissions:
        allow:
          - "Bash(bazel build:*)"  # Medium risk (may run genrule)
          - "Bash(bazel query:*)"
          - "Bash(bazel test:*)"   # Medium risk (may run genrule)
          - "Bash(gh issue close:*)"
          - "Bash(gh issue edit * --add-assignee @me)"
          - "Bash(gh issue edit * --remove-label *)"
          - "Bash(gh issue list:*)"
          - "Bash(gh issue reopen:*)"
          - "Bash(gh issue status:*)"
          - "Bash(gh issue view:*)"
          - "Bash(gh pr checks:*)"
          - "Bash(gh pr diff:*)"
          - "Bash(gh pr list:*)"
          - "Bash(gh pr status:*)"
          - "Bash(gh pr view:*)"
          - "Bash(gh release list:*)"
          - "Bash(gh release view:*)"
          - "Bash(gh repo view:*)"
          - "Bash(go build:*)"
          - "Bash(go fix:*)"
          - "Bash(go fmt:*)"
          - "Bash(go get:*)"
          - "Bash(go mod:*)"
          - "Bash(go test:*)"
          - "Bash(go version:*)"
          - "Bash(go vet:*)"
          - "Bash(git add:*)"
          - "Bash(git branch:*)"
          - "Bash(git commit:*)"
          - "Bash(git diff:*)"
          - "Bash(git log:*)"
          - "Bash(git status:*)"
          - "Bash(golangci-lint run:*)"
          - "Bash(rg:*)"       # Safe: read-only search tool, no exec capability
          - "Bash(ruff:*)"
          - "WebSearch"    # Read-only web search, low risk
        deny:
          - "Bash(eval:*)"      # Shell eval
          - "Bash(source:*)"    # Source scripts
          - "Bash(xargs:*)"     # Can execute arbitrary commands
          - "Read(.envrc)"
          - "Read(~/.aws/**)"
          - "Read(~/.azure/**)"
          - "Read(~/.bash_history)"
          - "Read(~/.cache/bazel/**)"
          - "Read(~/.config/gcloud/**)"
          - "Read(~/.docker/config.json)"
          - "Read(~/.gnupg/**)"
          - "Read(~/.kube/config)"
          - "Read(~/.my.cnf)"
          - "Read(~/.netrc)"
          - "Read(~/.npmrc)"
          - "Read(~/.password-store/**)"
          - "Read(~/.pgpass)"
          - "Read(~/.pypirc)"
          - "Read(~/.ssh/**)"
          - "Read(~/.zsh_history)"
  tasks:
    - name: Include guard for claude sandbox playbook
      block:
        - name: Stop early if the claude sandbox playbook is already included
          meta: end_play
          when: claude_sandbox_playbook_imported is defined
        - name: Ensure the claude sandbox playbook is not included
          set_fact:
            claude_sandbox_playbook_imported: true
          when: claude_sandbox_playbook_imported is not defined

    - name: Create ~/.claude directory
      file:
        path: "{{ claude_settings_dir }}"
        state: directory
        mode: "0755"

    - name: Create Claude temp directory
      file:
        path: "{{ claude_tmpdir }}"
        state: directory
        mode: "0700"

    - name: Check if running in Termux
      ansible.builtin.stat:
        path: /data/data/com.termux
      register: termux_check

    - name: Create gh wrapper script in ~/.local/shims/bin
      copy:
        content: |
          {% if termux_check.stat.exists %}#!/data/data/com.termux/files/usr/bin/bash
          {% else %}#!/usr/bin/env bash
          {% endif %}# Wrapper for gh CLI that detects sandbox-related TLS/auth failures on macOS
          # and prints a diagnostic warning before execution.

          # Find the real gh binary (skip this shim)
          REAL_GH=$(which -a gh | uniq | sed -n '2p')

          if [[ -z "$REAL_GH" ]]; then
              echo "Error: No real gh found in PATH" >&2
              exit 1
          fi

          # On macOS, the Claude Code sandbox blocks the Security framework Mach
          # service that Go's crypto/x509 (cgo) uses for TLS cert verification.
          # Detect this and warn before running gh, so the user sees the cause
          # instead of a cryptic x509 OSStatus error.
          if [[ "$(uname -s)" == "Darwin" && "${SANDBOX_RUNTIME:-}" == "1" ]]; then
              # Subcommands that don't need network access
              case "${1:-}" in
                  help|completion|alias)
                      ;; # skip warning
                  *)
                      echo "" >&2
                      echo "╭─ gh-shim: sandbox issue detected ─────────────────────────╮" >&2
                      echo "│ Claude Code sandbox is active on macOS. Go binaries like  │" >&2
                      echo "│ gh cannot verify TLS certs (Security framework blocked).  │" >&2
                      echo "│                                                           │" >&2
                      echo "│ Workarounds:                                              │" >&2
                      echo "│   1. Retry with dangerouslyDisableSandbox: true           │" >&2
                      echo "│   2. Use /sandbox to manage sandbox restrictions          │" >&2
                      echo "│   3. Use curl with \$GH_TOKEN as a fallback:               │" >&2
                      echo "│      curl -sH \"Authorization: bearer \$GH_TOKEN\" \\         │" >&2
                      echo "│        https://api.github.com/...                         │" >&2
                      echo "╰───────────────────────────────────────────────────────────╯" >&2
                      ;;
              esac
          fi

          exec "$REAL_GH" "$@"
        dest: "{{ user_shims_bin_directory }}/gh"
        mode: "0755"

    - name: Create jira wrapper script in ~/.local/shims/bin
      copy:
        content: |
          {% if termux_check.stat.exists %}#!/data/data/com.termux/files/usr/bin/bash
          {% else %}#!/usr/bin/env bash
          {% endif %}# Wrapper for jira CLI that detects sandbox-related TLS failures on macOS
          # and prints a diagnostic warning before execution.

          # Find the real jira binary (skip this shim)
          REAL_JIRA=$(which -a jira | uniq | sed -n '2p')

          if [[ -z "$REAL_JIRA" ]]; then
              echo "Error: No real jira found in PATH" >&2
              exit 1
          fi

          # On macOS, the Claude Code sandbox blocks the Security framework Mach
          # service that Go's crypto/x509 (cgo) uses for TLS cert verification.
          if [[ "$(uname -s)" == "Darwin" && "${SANDBOX_RUNTIME:-}" == "1" ]]; then
              case "${1:-}" in
                  help|completion)
                      ;; # skip warning
                  *)
                      echo "" >&2
                      echo "╭─ jira-shim: sandbox issue detected ──────────────────────╮" >&2
                      echo "│ Claude Code sandbox is active on macOS. Go binaries like │" >&2
                      echo "│ jira can't verify TLS certs (Security framework blocked).│" >&2
                      echo "│                                                          │" >&2
                      echo "│ Workarounds:                                             │" >&2
                      echo "│   1. Retry with dangerouslyDisableSandbox: true          │" >&2
                      echo "│   2. Use /sandbox to manage sandbox restrictions         │" >&2
                      echo "╰──────────────────────────────────────────────────────────╯" >&2
                      ;;
              esac
          fi

          exec "$REAL_JIRA" "$@"
        dest: "{{ user_shims_bin_directory }}/jira"
        mode: "0755"

    - name: Create claude wrapper script in ~/.local/shims/bin
      copy:
        content: |
          {% if termux_check.stat.exists %}#!/data/data/com.termux/files/usr/bin/bash
          {% else %}#!/usr/bin/env bash
          {% endif %}# Wrapper script for Claude Code to enforce sandbox environment variables

          # Find the real claude (skipping this wrapper)
          # which -a returns absolute paths. We take the second one because this wrapper
          # is expected to be the first one in PATH.
          REAL_CLAUDE=$(which -a claude | uniq | grep -v '/Applications/cmux.app/Contents/Resources/bin' | sed -n '2p')

          if [[ -z "$REAL_CLAUDE" ]]; then
              echo "Error: No real claude found in PATH" >&2
              exit 1
          fi

          # Set up Claude sandbox temp directory
          # Must capture original TMPDIR before overwriting it
          CLAUDE_TMPDIR_BASE="${TMPDIR:-/tmp}"
          export CLAUDE_CODE_TMPDIR="${CLAUDE_TMPDIR_BASE}/claude"
          export GOCACHE="${CLAUDE_TMPDIR_BASE}/claude/go-build"
          export GOLANGCI_LINT_CACHE="${CLAUDE_TMPDIR_BASE}/claude/golangci-lint"

          # Set TMPDIR to claude temp directory so heredocs work in sandbox
          # Shells create temp files for heredocs using TMPDIR
          export TMPDIR="${CLAUDE_TMPDIR_BASE}/claude"

          # TMPDIR consistency caveat (issue #148):
          # The sandbox overrides $TMPDIR to a session-scoped path, so files
          # written via $TMPDIR in sandboxed Bash calls are invisible to
          # non-sandboxed (dangerouslyDisableSandbox) calls and vice versa.
          # Use $CLAUDE_CODE_TMPDIR instead of $TMPDIR when sharing temp files
          # across sandbox modes. This path is added to the sandbox write
          # allowlist so it is writable in both modes.

          # Export GH_TOKEN so gh CLI works inside the sandbox without keychain access.
          # The wrapper runs unsandboxed, so `gh auth token` can read the keychain here.
          if [[ -z "$GH_TOKEN" ]] && command -v gh &>/dev/null; then
              token=$(gh auth token 2>/dev/null)
              if [[ -n "$token" ]]; then
                  export GH_TOKEN="$token"
              fi
          fi

          # Execute the real claude
          exec "$REAL_CLAUDE" "$@"
        dest: "{{ user_shims_bin_directory }}/claude"
        mode: "0755"

    - name: Check if settings.json exists
      stat:
        path: "{{ claude_settings_file }}"
      register: settings_file_stat

    - name: Create empty settings.json if not exists
      copy:
        content: "{}"
        dest: "{{ claude_settings_file }}"
        mode: "0644"
      when: not settings_file_stat.stat.exists

    - name: Read current settings.json
      slurp:
        src: "{{ claude_settings_file }}"
      register: current_settings_raw

    - name: Parse current settings and compute merged result
      set_fact:
        current_settings: "{{ current_settings_raw.content | b64decode | from_json }}"
        desired_settings: "{{ (current_settings_raw.content | b64decode | from_json) | combine(sandbox_config, recursive=True) }}"

    - name: Update settings.json if sandbox config changed
      copy:
        content: "{{ desired_settings | to_nice_json }}"
        dest: "{{ claude_settings_file }}"
        mode: "0644"
      when: current_settings != desired_settings

    - name: Display current sandbox settings
      shell: jq '.sandbox' "{{ claude_settings_file }}"
      register: sandbox_display
      changed_when: false

    - name: Show sandbox configuration
      debug:
        msg: "{{ sandbox_display.stdout }}"
