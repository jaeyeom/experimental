---
- import_playbook: which.yml
- import_playbook: setup-user-bin-directory.yml

- name: Deploy secure find wrapper
  hosts: all
  tasks:
    - name: Include guard for setup-find playbook
      block:
        - name: Stop early if the setup-find playbook is already included
          meta: end_play
          when: setup_find_playbook_imported is defined
        - name: Ensure the setup-find playbook is not included
          set_fact:
            setup_find_playbook_imported: true
          when: setup_find_playbook_imported is not defined

    - name: Check if claude is installed
      shell: command -v claude
      register: claude_check
      failed_when: false
      changed_when: false

    - name: Install git-guardrails plugin (covers find guardrails)
      command: claude plugin install git-guardrails@claude-toolbox
      when: claude_check.rc == 0
      changed_when: true

    - name: Remove shims replaced by git-guardrails plugin
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ user_shims_bin_directory }}/find"
        - "{{ user_bin_directory }}/find"
      when: claude_check.rc == 0
