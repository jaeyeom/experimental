    - name: Ensure tflint is present on MacOS
      block:
        - name: Check if tflint is installed
          shell: command -v tflint
          changed_when: False
      rescue:
        - name: Install tflint on MacOS
          community.general.homebrew:
            name: tflint
            state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Install tflint via shell on Debian/Ubuntu
      block:
        - name: Check if tflint is installed
          shell: command -v tflint
          register: tflint_installed
          failed_when: false
          changed_when: False

        - name: Install tflint
          shell: |
            curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          when: tflint_installed.rc != 0
