- import_playbook: gather-facts.yml
- import_playbook: setup-java.yml
- import_playbook: curl.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
- import_playbook: setup-user-bin-directory.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"

- name: Ensure google-java-format is present
  hosts: all
  tasks:
    - name: Include guard for google-java-format playbook
      block:
        - name: Stop early if the google-java-format playbook is already included
          meta: end_play
          when: google_java_format_playbook_imported is defined
        - name: Ensure the google-java-format playbook is not included
          set_fact:
            google_java_format_playbook_imported: true
          when: google_java_format_playbook_imported is not defined

    - name: Ensure google-java-format is present on MacOS
      block:
        - name: Check if google-java-format is installed
          shell: command -v google-java-format
          changed_when: False
      rescue:
        - name: Install google-java-format on MacOS
          community.general.homebrew:
            name: google-java-format
            state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Install google-java-format via shell on Debian/Ubuntu
      block:
        - name: Check if google-java-format is installed
          shell: command -v google-java-format
          register: google_java_format_command_check
          failed_when: false
          changed_when: False

        - name: Get installed google-java-format version
          command: google-java-format --version
          register: google_java_format_version_output
          failed_when: false
          changed_when: False
          when: google_java_format_command_check.rc == 0

        - name: Parse installed google-java-format version
          set_fact:
            google_java_format_installed_version: "{{ (google_java_format_version_output.stdout | regex_search('([0-9.]+)', '\\1')) | default(['0.0.0'], true) | first }}"
          when: google_java_format_command_check.rc == 0

        - name: Set default version when google-java-format is not installed
          set_fact:
            google_java_format_installed_version: "0.0.0"
          when: google_java_format_command_check.rc != 0

        - name: Get latest available google-java-format version from GitHub
          ansible.builtin.include_tasks: tasks/github-release-info.yml
          vars:
            github_release_name: google-java-format
            github_release_owner: google
            github_release_repo: google-java-format
            github_release_register: google_java_format_latest_release

        - name: Parse latest google-java-format version from GitHub response
          set_fact:
            google_java_format_latest_version: "{{ google_java_format_latest_release.json.tag_name | regex_replace('^v', '') }}"

        - name: Install/update google-java-format if outdated
          shell: |
            version="{{ google_java_format_latest_release.json.tag_name | regex_replace('^v', '') }}"
            curl -sSL -o {{ user_bin_directory }}/google-java-format-all-deps.jar "https://github.com/google/google-java-format/releases/download/v${version}/google-java-format-${version}-all-deps.jar"
            cat > {{ user_bin_directory }}/google-java-format << 'WRAPPER'
            #!/bin/bash
            exec java -jar "$(dirname "$0")/google-java-format-all-deps.jar" "$@"
            WRAPPER
            chmod +x {{ user_bin_directory }}/google-java-format
          when: google_java_format_installed_version != google_java_format_latest_version
      when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
