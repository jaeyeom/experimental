- import_playbook: gather-facts.yml
- import_playbook: setup-npm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is defined
- import_playbook: setup-nvm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"

- name: Ensure oxlint is present
  hosts: all
  tasks:
    - name: Include guard for oxlint playbook
      block:
        - name: Stop early if the oxlint playbook is already included
          meta: end_play
          when: oxlint_playbook_imported is defined
        - name: Ensure the oxlint playbook is not included
          set_fact:
            oxlint_playbook_imported: true
          when: oxlint_playbook_imported is not defined

    - name: Ensure oxlint is present on MacOS
      block:
        - name: Check if oxlint is installed
          shell: command -v oxlint
          changed_when: False
      rescue:
        - name: Install oxlint on MacOS
          community.general.homebrew:
            name: oxlint
            state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Ensure oxlint is present on Termux
      block:
        - name: Check if oxlint is installed
          shell: command -v oxlint
          register: oxlint_installed
          ignore_errors: yes
          changed_when: False

        - name: Install oxlint using npm
          command: npm install -g oxlint
          when: oxlint_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is defined

    - name: Install oxlint via nvm on Debian/Ubuntu
      block:
        - name: Check if oxlint is installed
          shell: command -v oxlint
          register: oxlint_installed
          ignore_errors: yes
          changed_when: False

        - name: Install oxlint using npm through nvm
          shell: |
            export NVM_DIR="{{ detected_nvm_dir }}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" \
              && nvm use --delete-prefix default --silent \
              && npm install -g oxlint
          when: oxlint_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
