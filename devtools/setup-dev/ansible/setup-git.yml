---
- import_playbook: git.yml
- import_playbook: delta.yml
- import_playbook: which.yml
- import_playbook: setup-user-bin-directory.yml

- name: Ensure git is properly set up
  hosts: all
  tasks:
    - name: Include guard for setup-git playbook
      block:
        - name: Stop early if the setup-git playbook is already included
          meta: end_play
          when: setup_git_playbook_imported is defined
        - name: Ensure the setup-git playbook is not included
          set_fact:
            setup_git_playbook_imported: true
          when: setup_git_playbook_imported is not defined

    - name: Determine the user name
      shell: git config --global user.name
      register: get_git_user_name
      ignore_errors: true
      changed_when: False

    - name: Determine the user email
      shell: git config --global user.email
      register: get_git_user_email
      ignore_errors: true
      changed_when: False

    - name: Determine the github username
      shell: git config --global github.user
      register: get_github_username
      ignore_errors: true
      changed_when: False

    - name: Determine the default branch
      shell: git config --global init.defaultBranch
      register: get_git_default_branch
      ignore_errors: true
      changed_when: False

    - name: Determine the merge conflict style
      shell: git config --global merge.conflictstyle
      register: get_git_merge_conflictstyle
      ignore_errors: true
      changed_when: False

    - name: Asserts that user name and email are available
      ansible.builtin.assert:
        that:
          - (get_git_user_name.stdout | length > 0) or (ansible_facts['env']['GIT_AUTHOR_NAME'] is defined and ansible_facts['env']['GIT_AUTHOR_NAME'] | length > 0)
          - (get_git_user_email.stdout | length > 0) or (ansible_facts['env']['GIT_AUTHOR_EMAIL'] is defined and ansible_facts['env']['GIT_AUTHOR_EMAIL'] | length > 0)
          - (get_github_username.stdout | length > 0) or (ansible_facts['env']['GITHUB_USERNAME'] is defined and ansible_facts['env']['GITHUB_USERNAME'] | length > 0)
        fail_msg: "Please set GIT_AUTHOR_NAME, GIT_AUTHOR_EMAIL and/or GITHUB_USERNAME"

    - name: Set global user name
      shell: git config --global user.name "{{ ansible_facts['env']['GIT_AUTHOR_NAME'] }}"
      when: get_git_user_name.stdout == ""

    - name: Set global user email
      shell: git config --global user.email "{{ ansible_facts['env']['GIT_AUTHOR_EMAIL'] }}"
      when: get_git_user_email.stdout == ""

    - name: Set global user name
      shell: git config --global github.user "{{ ansible_facts['env']['GITHUB_USERNAME'] }}"
      when: get_github_username.stdout == ""

    - name: Set default branch to main
      shell: git config --global init.defaultBranch main
      when: get_git_default_branch.stdout == ""

    - name: Set merge conflict style to zdiff3
      shell: git config --global merge.conflictstyle zdiff3
      when: get_git_merge_conflictstyle.stdout == ""

    - name: Ensure git user name is set
      ansible.builtin.set_fact:
        git_user_name: "{{ get_git_user_name.stdout | default(ansible_facts['env']['GIT_AUTHOR_NAME']) }}"

    - name: Ensure git user email is set
      ansible.builtin.set_fact:
        git_user_email: "{{ get_git_user_email.stdout | default(ansible_facts['env']['GIT_AUTHOR_EMAIL']) }}"

    - name: Ensure git user name is set
      ansible.builtin.set_fact:
        github_username: "{{ get_github_username.stdout | default(ansible_facts['env']['GITHUB_USERNAME']) }}"

    - name: Debug name
      ansible.builtin.debug:
        msg: "The git user name is {{ git_user_name }}"

    - name: Debug email
      ansible.builtin.debug:
        msg: "The git user email is {{ git_user_email }}"

    - name: Determine the git statuslog alias
      shell: git config --global alias.statuslog
      register: get_git_alias_statuslog
      ignore_errors: true
      changed_when: false

    - name: Set git statuslog alias
      shell: >-
        git config --global alias.statuslog
        '!f() {
        git fetch origin >/dev/null 2>&1;
        echo "### UNTRACKED"; echo;
        git ls-files --others --exclude-standard;
        echo;
        echo "### UNSTAGED"; echo;
        git -c color.ui=always diff;
        echo;
        echo "### STAGED"; echo;
        git -c color.ui=always diff --cached;
        echo;
        echo "### COMMITS main vs origin/main"; echo;
        git -c color.ui=always log -p origin/main..main --color=always;
        }; f'
      when: get_git_alias_statuslog.rc != 0

    - name: Install git-guardrails plugin
      command: claude plugin install jaeyeom/claude-toolbox --plugin git-guardrails
      changed_when: true

    - name: Remove shims replaced by git-guardrails plugin
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ user_shims_bin_directory }}/git"
        - "{{ user_bin_directory }}/git"
