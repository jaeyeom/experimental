- import_playbook: gather-facts.yml
- import_playbook: setup-npm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is defined
- import_playbook: setup-nvm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"

- name: Ensure markdownlint is present
  hosts: all
  tasks:
    - name: Include guard for markdownlint playbook
      block:
        - name: Stop early if the markdownlint playbook is already included
          meta: end_play
          when: markdownlint_playbook_imported is defined
        - name: Ensure the markdownlint playbook is not included
          set_fact:
            markdownlint_playbook_imported: true
          when: markdownlint_playbook_imported is not defined

    - name: Ensure markdownlint is present on MacOS
      block:
        - name: Check if markdownlint is installed
          shell: command -v markdownlint
          changed_when: False
      rescue:
        - name: Install markdownlint on MacOS
          community.general.homebrew:
            name: markdownlint-cli
            state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Ensure markdownlint is present on Termux
      block:
        - name: Check if markdownlint is installed
          shell: command -v markdownlint
          register: markdownlint_installed
          ignore_errors: yes
          changed_when: False

        - name: Install markdownlint using npm
          command: npm install -g markdownlint-cli
          when: markdownlint_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is defined

    - name: Install markdownlint via nvm on Debian/Ubuntu
      block:
        - name: Check if markdownlint is installed
          shell: command -v markdownlint
          register: markdownlint_installed
          ignore_errors: yes
          changed_when: False

        - name: Install markdownlint using npm through nvm
          shell: |
            export NVM_DIR="{{ detected_nvm_dir }}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm exec default npm install -g markdownlint-cli
          when: markdownlint_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
