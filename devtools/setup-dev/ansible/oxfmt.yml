- import_playbook: gather-facts.yml
- import_playbook: setup-npm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is defined
- import_playbook: setup-nvm.yml
  when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"

- name: Ensure oxfmt is present
  hosts: all
  tasks:
    - name: Include guard for oxfmt playbook
      block:
        - name: Stop early if the oxfmt playbook is already included
          meta: end_play
          when: oxfmt_playbook_imported is defined
        - name: Ensure the oxfmt playbook is not included
          set_fact:
            oxfmt_playbook_imported: true
          when: oxfmt_playbook_imported is not defined

    - name: Ensure oxfmt is present on MacOS
      block:
        - name: Check if oxfmt is installed
          shell: command -v oxfmt
          changed_when: False
      rescue:
        - name: Install oxfmt on MacOS
          community.general.homebrew:
            name: oxfmt
            state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Ensure oxfmt is present on Termux
      block:
        - name: Check if oxfmt is installed
          shell: command -v oxfmt
          register: oxfmt_installed
          ignore_errors: yes
          changed_when: False

        - name: Install oxfmt using npm
          command: npm install -g oxfmt
          when: oxfmt_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is defined

    - name: Install oxfmt via nvm on Debian/Ubuntu
      block:
        - name: Check if oxfmt is installed
          shell: command -v oxfmt
          register: oxfmt_installed
          ignore_errors: yes
          changed_when: False

        - name: Install oxfmt using npm through nvm
          shell: |
            export NVM_DIR="{{ detected_nvm_dir }}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" \
              && nvm use --delete-prefix default --silent \
              && npm install -g oxfmt
          when: oxfmt_installed.rc != 0
      when: ansible_facts['env']['TERMUX_VERSION'] is not defined and ansible_facts['os_family'] != "Darwin"
