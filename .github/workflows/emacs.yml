name: Emacs Init Test

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths: '**/.spacemacs'
  pull_request:
    branches: [ main ]
    paths: '**/.spacemacs'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # v8.0
        with:
          version: 29.4
      - name: Build
        run: make
        working-directory: spacemacs/